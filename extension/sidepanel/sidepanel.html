<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="sidepanel.css" />
    <title>FormPilot</title>
  </head>
  <body>
    <div class="header">
      <h1>FormPilot</h1>
      <div id="status-indicator" class="status connected">Ready</div>
    </div>

    <div class="controls">
      <button id="analyze-btn" class="btn primary">Analyze This Form</button>
      <button id="mic-btn" class="btn mic-btn">🎤 Start Recording</button>
    </div>

    <div class="section">
      <h3>Current Form</h3>
      <div id="progress-container">
        <div id="progress-bar"></div>
      </div>
      <p id="progress-text">0/0 fields filled</p>
      <ul id="field-list" class="field-list">
        <!-- Fields will be injected here -->
      </ul>
    </div>

    <script src="sidepanel.js"></script>
  </body>
</html>
