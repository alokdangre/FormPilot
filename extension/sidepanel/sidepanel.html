<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="sidepanel.css" />
    <title>FormPilot</title>
  </head>
  <body>
    <div class="header">
      <h1>🤖 FormPilot</h1>
      <div id="status-indicator" class="status">Connecting...</div>
    </div>

    <div class="controls">
      <button id="analyze-btn" class="btn primary">⚡ Analyze & Fill This Form</button>
    </div>

    <!-- User's speech (what they said) -->
    <div id="user-transcript" class="user-transcript" style="display:none;"></div>

    <!-- Live AI transcript (shows streaming text in real-time) -->
    <div id="live-transcript" class="live-transcript" style="display:none;"></div>

    <div class="section">
      <h3>📋 Form Fields</h3>
      <div id="progress-container">
        <div id="progress-bar"></div>
      </div>
      <p id="progress-text">Click "Analyze" to start</p>
      <ul id="field-list" class="field-list"></ul>
    </div>

    <div class="section">
      <h3>🎤 Heard You</h3>
      <div id="heard-log" class="heard-log">
        <div class="heard-entry muted">Your speech-to-text transcript will appear here.</div>
      </div>
    </div>

    <div class="section">
      <h3>📜 Activity Log</h3>
      <div id="activity-log" class="activity-log">
        <div class="log-entry">
          <span class="log-time">--:--:--</span> FormPilot ready. Open a form and click Analyze. Voice will start automatically if anything is still missing.
        </div>
      </div>
    </div>

    <script src="sidepanel.js"></script>
  </body>
</html>
